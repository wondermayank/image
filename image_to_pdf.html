<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNG to PDF Converter — Multiple Images, Paste, Drop, or Upload | Wondermayank</title>
<meta name="description" content="Convert multiple PNG images into a single PDF instantly in your browser. Paste, drag and drop, or click to upload up to 30 images. Reorder pages freely.">
<link rel="icon" type="image/svg+xml" href="https://wondermayank.github.io/favicon.svg">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{--primary:#573AFC;--primary-active:#4527E0;--ink:#1d1d1f;--body:#3c3c3c;--muted:#6b6b6b;--muted-soft:#9a9a9a;--hairline:#e6e6e6;--hairline-strong:#cccccc;--canvas:#ffffff;--canvas-parchment:#f5f5f7;--on-primary:#ffffff;--error:#dc2626;}
  [data-theme="dark"]{--ink:#f5f5f7;--body:#d1d1d6;--muted:#8e8e93;--muted-soft:#636366;--hairline:#2c2c2e;--hairline-strong:#3a3a3c;--canvas:#0e0e10;--canvas-parchment:#161618;--primary:#9A7AFB;--primary-active:#7C5CF0;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:Inter,system-ui,-apple-system,sans-serif;background:var(--canvas-parchment);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background .2s,color .2s;}
  header{width:100%;max-width:680px;padding:28px 20px 8px;display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;letter-spacing:-0.1px;}
  .brand img{width:26px;height:26px;border-radius:6px;}
  .theme-toggle{width:40px;height:40px;border-radius:9999px;border:1px solid var(--hairline-strong);background:var(--canvas);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .theme-toggle svg{width:18px;height:18px;stroke:var(--ink);}
  main{width:100%;max-width:680px;padding:24px 20px 60px;flex:1;display:flex;flex-direction:column;align-items:center;}
  h1{font-size:28px;font-weight:700;letter-spacing:-0.2px;margin:10px 0 6px;text-align:center;}
  p.lead{font-size:16px;font-weight:400;color:var(--muted);text-align:center;margin:0 0 28px;max-width:480px;}
  .dropzone{width:100%;min-height:220px;border:2px dashed var(--hairline-strong);border-radius:18px;background:var(--canvas);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;padding:32px 20px;transition:border-color .15s,background .15s,transform .1s;}
  .dropzone:active{transform:scale(0.99);}
  .dropzone.drag-over{border-color:var(--primary);background:color-mix(in srgb, var(--primary) 6%, var(--canvas));}
  .dropzone svg{width:42px;height:42px;stroke:var(--primary);margin-bottom:14px;}
  .dz-title{font-size:17px;font-weight:600;margin:0 0 6px;}
  .dz-sub{font-size:14px;color:var(--muted);margin:0;line-height:1.5;}
  .dz-sub kbd{font-family:inherit;background:var(--canvas-parchment);border:1px solid var(--hairline-strong);border-radius:5px;padding:1px 6px;font-size:13px;}
  input[type="file"]{display:none;}

  .limit-note{font-size:13px;color:var(--muted-soft);margin-top:10px;text-align:center;}
  .warn-banner{display:none;background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:11px;padding:12px 16px;font-size:13px;margin-top:14px;width:100%;line-height:1.5;}
  [data-theme="dark"] .warn-banner{background:#2a2410;border-color:#5c4a1e;color:#fcd34d;}
  .warn-banner.show{display:block;}

  .page-list{width:100%;margin-top:20px;display:flex;flex-direction:column;gap:10px;}
  .page-card{display:flex;align-items:center;gap:12px;background:var(--canvas);border:1px solid var(--hairline);border-radius:14px;padding:10px 12px;}
  .page-card.dragging{opacity:0.4;}
  .page-num{width:24px;height:24px;border-radius:9999px;background:var(--primary);color:var(--on-primary);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .page-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;background:var(--canvas-parchment);flex-shrink:0;}
  .page-info{flex:1;min-width:0;}
  .page-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .page-size{font-size:12px;color:var(--muted);}
  .page-controls{display:flex;gap:4px;flex-shrink:0;}
  .icon-btn{width:34px;height:34px;border-radius:9999px;border:1px solid var(--hairline-strong);background:var(--canvas);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .icon-btn svg{width:16px;height:16px;stroke:var(--ink);}
  .icon-btn.remove svg{stroke:var(--error);}
  .drag-handle{cursor:grab;color:var(--muted-soft);flex-shrink:0;touch-action:none;}
  .drag-handle svg{width:18px;height:18px;}

  .options-card{width:100%;background:var(--canvas);border:1px solid var(--hairline);border-radius:18px;padding:20px;margin-top:20px;display:none;}
  .options-card.show{display:block;}
  .opt-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .opt-row:last-child{margin-bottom:0;}
  .opt-row label{font-size:14px;font-weight:600;}
  select{border:1px solid var(--hairline-strong);background:var(--canvas);color:var(--ink);border-radius:9999px;padding:8px 14px;font-size:14px;font-family:inherit;}

  .actions{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;}
  .btn{flex:1;min-width:140px;height:48px;border-radius:9999px;border:none;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s,background .15s;}
  .btn:active{transform:scale(0.95);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn-primary{background:var(--primary);color:var(--on-primary);}
  .btn-primary:hover{background:var(--primary-active);}
  .btn-secondary{background:var(--canvas);color:var(--ink);border:1px solid var(--hairline-strong);}
  .btn svg{width:18px;height:18px;}

  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--canvas);padding:12px 20px;border-radius:9999px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  footer{width:100%;text-align:center;padding:18px;font-size:12px;color:var(--muted-soft);}
  @media (max-width:480px){h1{font-size:23px;} .btn{min-width:0;}}
</style>
</head>
<body>

<header>
  <div class="brand"><img src="https://wondermayank.github.io/favicon.svg" alt=""><span>PNG → PDF</span></div>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"><svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg></button>
</header>

<main>
  <h1>PNG to PDF Converter</h1>
  <p class="lead">Paste, drop, or click to add images — combine up to 30 into a single PDF, all in your browser.</p>

  <div class="dropzone" id="dropzone" tabindex="0" role="button" aria-label="Upload, paste, or drop PNG images">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <p class="dz-title">Drop PNGs here</p>
    <p class="dz-sub">or click to browse (multi-select works) &nbsp;·&nbsp; or <kbd>Ctrl</kbd>+<kbd>V</kbd> to paste</p>
  </div>
  <input type="file" id="fileInput" accept="image/png,image/*" multiple>
  <p class="limit-note" id="countNote">0 of 30 images added</p>
  <div class="warn-banner" id="warnBanner"></div>

  <div class="page-list" id="pageList"></div>

  <div class="options-card" id="optionsCard">
    <div class="opt-row">
      <label for="pageSize">Page size</label>
      <select id="pageSize">
        <option value="fit">Fit to image</option>
        <option value="a4">A4</option>
        <option value="letter">Letter</option>
      </select>
    </div>
    <div class="opt-row">
      <label for="orientation">Orientation</label>
      <select id="orientation">
        <option value="auto">Auto (per image)</option>
        <option value="portrait">Portrait</option>
        <option value="landscape">Landscape</option>
      </select>
    </div>
  </div>

  <div class="actions" id="actionsRow" style="display:none;">
    <button class="btn btn-secondary" id="clearBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Clear all</button>
    <button class="btn btn-primary" id="downloadBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download PDF</button>
  </div>
</main>

<footer>© 2026 Thunder · by wondermayank</footer>
<div class="toast" id="toast">Converted!</div>

<script>
(function(){
  const MAX_IMAGES=30;
  const dropzone=document.getElementById('dropzone'),fileInput=document.getElementById('fileInput'),pageList=document.getElementById('pageList'),countNote=document.getElementById('countNote'),warnBanner=document.getElementById('warnBanner'),optionsCard=document.getElementById('optionsCard'),actionsRow=document.getElementById('actionsRow'),pageSizeSel=document.getElementById('pageSize'),orientationSel=document.getElementById('orientation'),downloadBtn=document.getElementById('downloadBtn'),clearBtn=document.getElementById('clearBtn'),toast=document.getElementById('toast'),themeToggle=document.getElementById('themeToggle'),themeIcon=document.getElementById('themeIcon');

  let images=[]; // {id, name, dataUrl, width, height, sizeBytes}
  let dragSrcIndex=null;

  const sunPath='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.79"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  const moonPath='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  function applyTheme(t){document.documentElement.setAttribute('data-theme',t);themeIcon.innerHTML=t==='dark'?sunPath:moonPath;localStorage.setItem('theme',t);}
  applyTheme(localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'));
  themeToggle.addEventListener('click',()=>applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'));

  function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1800);}
  function formatBytes(b){if(b<1024)return b+' B';if(b<1024*1024)return (b/1024).toFixed(1)+' KB';return (b/(1024*1024)).toFixed(2)+' MB';}

  function totalBytes(){return images.reduce((s,i)=>s+i.sizeBytes,0);}

  function updateWarning(){
    const total=totalBytes();
    const totalMB=total/(1024*1024);
    if(images.length>20 || totalMB>80){
      warnBanner.classList.add('show');
      warnBanner.textContent='Large batch ('+images.length+' images, '+formatBytes(total)+' combined). Mobile browsers may slow down or struggle generating the PDF — consider splitting into smaller batches if it freezes.';
    } else {
      warnBanner.classList.remove('show');
    }
  }

  function addFiles(fileList){
    const files=Array.from(fileList).filter(f=>f.type.startsWith('image/'));
    if(files.length===0){showToast('Please use image files');return;}
    let remaining=MAX_IMAGES-images.length;
    if(remaining<=0){showToast('Limit of '+MAX_IMAGES+' images reached');return;}
    if(files.length>remaining) showToast('Only added '+remaining+' (limit is '+MAX_IMAGES+')');
    files.slice(0,remaining).forEach(file=>{
      const reader=new FileReader();
      reader.onload=(e)=>{
        const img=new Image();
        img.onload=()=>{
          images.push({
            id:Math.random().toString(36).slice(2),
            name:(file.name||'image').replace(/\.[^/.]+$/,''),
            dataUrl:e.target.result,
            width:img.naturalWidth,
            height:img.naturalHeight,
            sizeBytes:file.size
          });
          renderList();
        };
        img.src=e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function renderList(){
    pageList.innerHTML='';
    images.forEach((img,idx)=>{
      const card=document.createElement('div');
      card.className='page-card';
      card.draggable=true;
      card.dataset.idx=idx;
      card.innerHTML=
        '<span class="drag-handle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></span>'
        +'<span class="page-num">'+(idx+1)+'</span>'
        +'<img class="page-thumb" src="'+img.dataUrl+'" alt="">'
        +'<div class="page-info"><div class="page-name">'+img.name+'.png</div><div class="page-size">'+img.width+'×'+img.height+' · '+formatBytes(img.sizeBytes)+'</div></div>'
        +'<div class="page-controls">'
        +'<button class="icon-btn up" aria-label="Move up" '+(idx===0?'disabled style="opacity:.3"':'')+'><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>'
        +'<button class="icon-btn down" aria-label="Move down" '+(idx===images.length-1?'disabled style="opacity:.3"':'')+'><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg></button>'
        +'<button class="icon-btn remove" aria-label="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>'
        +'</div>';

      card.querySelector('.up').addEventListener('click',()=>{if(idx>0){[images[idx-1],images[idx]]=[images[idx],images[idx-1]];renderList();}});
      card.querySelector('.down').addEventListener('click',()=>{if(idx<images.length-1){[images[idx+1],images[idx]]=[images[idx],images[idx+1]];renderList();}});
      card.querySelector('.remove').addEventListener('click',()=>{images.splice(idx,1);renderList();});

      card.addEventListener('dragstart',()=>{dragSrcIndex=idx;card.classList.add('dragging');});
      card.addEventListener('dragend',()=>{card.classList.remove('dragging');});
      card.addEventListener('dragover',(e)=>e.preventDefault());
      card.addEventListener('drop',(e)=>{
        e.preventDefault();
        if(dragSrcIndex===null||dragSrcIndex===idx)return;
        const moved=images.splice(dragSrcIndex,1)[0];
        images.splice(idx,0,moved);
        dragSrcIndex=null;
        renderList();
      });

      pageList.appendChild(card);
    });

    countNote.textContent=images.length+' of '+MAX_IMAGES+' images added';
    optionsCard.classList.toggle('show',images.length>0);
    actionsRow.style.display=images.length>0?'flex':'none';
    updateWarning();
  }

  async function buildPdf(){
    const { jsPDF } = window.jspdf;
    const sizeMode=pageSizeSel.value;
    const orientMode=orientationSel.value;
    let doc=null;

    for(let i=0;i<images.length;i++){
      const img=images[i];
      const isLandscape = orientMode==='landscape' ? true : orientMode==='portrait' ? false : img.width>img.height;
      let format='a4';
      if(sizeMode==='letter') format='letter';
      if(sizeMode==='fit') format=[img.width,img.height];

      const pageOptions = sizeMode==='fit'
        ? { orientation: isLandscape?'landscape':'portrait', unit:'px', format: isLandscape?[img.height,img.width]:[img.width,img.height] }
        : { orientation: isLandscape?'landscape':'portrait', unit:'mm', format };

      if(i===0){
        doc=new jsPDF(pageOptions);
      } else {
        doc.addPage(pageOptions.format,pageOptions.orientation);
      }

      const pageW=doc.internal.pageSize.getWidth();
      const pageH=doc.internal.pageSize.getHeight();
      const ratio=Math.min(pageW/img.width,pageH/img.height);
      const drawW=img.width*ratio, drawH=img.height*ratio;
      const x=(pageW-drawW)/2, y=(pageH-drawH)/2;
      doc.addImage(img.dataUrl,'PNG',x,y,drawW,drawH);
    }
    return doc;
  }

  dropzone.addEventListener('click',()=>fileInput.click());
  dropzone.addEventListener('keydown',(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();fileInput.click();}});
  fileInput.addEventListener('change',(e)=>{if(e.target.files&&e.target.files.length)addFiles(e.target.files);fileInput.value='';});

  ['dragenter','dragover'].forEach(evt=>dropzone.addEventListener(evt,(e)=>{e.preventDefault();dropzone.classList.add('drag-over');}));
  ['dragleave','drop'].forEach(evt=>dropzone.addEventListener(evt,(e)=>{e.preventDefault();dropzone.classList.remove('drag-over');}));
  dropzone.addEventListener('drop',(e)=>{if(e.dataTransfer.files&&e.dataTransfer.files.length)addFiles(e.dataTransfer.files);});
  ['dragover','drop'].forEach(evt=>window.addEventListener(evt,(e)=>{ if(e.target.closest && !e.target.closest('.dropzone')) e.preventDefault(); else if(!e.target.closest) e.preventDefault(); }));

  window.addEventListener('paste',(e)=>{
    const items=e.clipboardData&&e.clipboardData.items;if(!items)return;
    const files=[];
    for(const item of items){if(item.type.indexOf('image')!==-1)files.push(item.getAsFile());}
    if(files.length)addFiles(files);
  });

  downloadBtn.addEventListener('click',async ()=>{
    if(images.length===0)return;
    downloadBtn.disabled=true;
    downloadBtn.textContent='Building…';
    try{
      const doc=await buildPdf();
      doc.save('images.pdf');
      showToast('Downloaded PDF ('+images.length+' page'+(images.length>1?'s':'')+')');
    }catch(err){
      showToast('Failed — try fewer or smaller images');
      console.error(err);
    }
    downloadBtn.disabled=false;
    downloadBtn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download PDF';
  });

  clearBtn.addEventListener('click',()=>{images=[];renderList();});

  renderList();
})();
</script>
</body>
</html>
